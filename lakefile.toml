name = "UnifiedTheory"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["UnifiedTheory"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[require]]
name = "CausalAlgebraicGeometry"
git = "https://github.com/tomdif/causal-algebraic-geometry-lean.git"
rev = "4fd6f26f5c7cd8e62fba6db00852d6712535ce38"

[[lean_lib]]
name = "UnifiedTheory"
